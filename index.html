<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dashboard">
<meta name="theme-color" content="#1a1917">
<title>My Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --surface2: #eeede9;
    --border: #e0deda; --text: #1a1917; --muted: #7a786f;
    --accent-soft: #e8e7e3;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --radius: 14px; --mono: 'DM Mono', monospace; --sans: 'DM Sans', sans-serif;
  }

  html, body { height: 100%; }
  body {
    font-family: var(--sans); background: var(--bg); color: var(--text);
    overflow-x: hidden; padding-top: var(--safe-top); padding-bottom: calc(64px + var(--safe-bottom));
  }

  /* ── Bottom Nav ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; height: calc(56px + var(--safe-bottom));
    padding-bottom: var(--safe-bottom); background: var(--surface); border-top: 1px solid var(--border);
    display: flex; z-index: 100;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; cursor: pointer; border: none; background: none; color: var(--muted);
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.05em; text-transform: uppercase;
    transition: color .15s; padding-bottom: 2px;
  }
  .nav-btn.active { color: var(--text); }
  .nav-icon { font-size: 20px; line-height: 1; }

  /* ── Pages ── */
  .page { display: none; padding: 20px 16px; animation: fadeUp .25s ease; }
  .page.active { display: block; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  /* ── Page header ── */
  .page-header { margin-bottom: 20px; }
  .page-greeting { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2px; }
  .page-title { font-size: 28px; font-weight: 300; letter-spacing: -0.02em; }
  .page-clock { font-family: var(--mono); font-size: 36px; font-weight: 300; letter-spacing: -0.03em; }

  /* ── Cards ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 12px; }
  .card-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }

  /* ── News UI ── */
  .news-filter { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .news-filter-btn { font-family: var(--mono); font-size: 9px; letter-spacing: 0.04em; padding: 6px 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; transition: all .15s; text-transform: uppercase; }
  .news-filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .news-item { background: var(--surface2); border-radius: 10px; padding: 16px; margin-bottom: 10px; text-decoration: none; color: inherit; display: flex; gap: 12px; align-items: flex-start; border: 1px solid transparent; transition: border-color .15s; }
  .news-item:active { opacity: .7; }
  .news-item-body { flex: 1; min-width: 0; }
  .news-meta { font-family: var(--mono); font-size: 9px; color: var(--muted); margin-bottom: 5px; display: flex; gap: 8px; align-items: center; }
  .news-tag { font-family: var(--mono); font-size: 8px; background: var(--accent-soft); color: var(--muted); padding: 2px 6px; border-radius: 20px; font-weight: 500; }
  .news-title { font-size: 14px; font-weight: 500; line-height: 1.5; }
  .news-thumb-placeholder { width: 48px; height: 48px; border-radius: 8px; background: var(--accent-soft); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .news-reload { font-family: var(--mono); font-size: 10px; background: none; border: 1px solid var(--border); border-radius: 8px; padding: 5px 12px; color: var(--muted); cursor: pointer; margin-left: auto; display: block; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="page active" id="page-home">
  <div class="page-header">
    <div class="page-greeting" id="greeting"></div>
    <div style="display:flex;justify-content:space-between;align-items:flex-end">
      <div class="page-title" id="dateStr">—</div>
      <div class="page-clock" id="clock">--:--</div>
    </div>
  </div>
  <div class="card">
    <div class="card-label">Next Tasks</div>
    <div id="homeTodo" style="font-size: 13px; color: var(--muted);">タスク機能は準備中です...</div>
  </div>
</div>

<div class="page" id="page-news">
  <div class="page-header">
    <div class="page-greeting">Infra & Dev Updates</div>
    <div class="page-title">News Feed</div>
  </div>
  <div class="news-filter">
    <button class="news-filter-btn active" onclick="filterNews('all',this)">All</button>
    <button class="news-filter-btn" onclick="filterNews('NW',this)">Network</button>
    <button class="news-filter-btn" onclick="filterNews('Cloud',this)">Cloud</button>
    <button class="news-filter-btn" onclick="filterNews('Dev',this)">Dev/IaC</button>
  </div>
  <button class="news-reload" onclick="fetchNews()">↻ Reload</button>
  <div id="newsList"><div class="news-msg" style="text-align:center; padding:40px; color:var(--muted); font-family:var(--mono); font-size:12px;">Loading feeds...</div></div>
</div>

<div class="page" id="page-settings">
  <div class="page-header">
    <div class="page-greeting">Preferences</div>
    <div class="page-title">Settings</div>
  </div>
  <div class="card">
    <div class="card-label">App Info</div>
    <div style="font-size: 13px; color: var(--muted);">設定機能は準備中です...</div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="showPage('home',this)"><span class="nav-icon">⌂</span>Home</button>
  <button class="nav-btn" onclick="showPage('news',this)"><span class="nav-icon">◈</span>News</button>
  <button class="nav-btn" onclick="showPage('settings',this)"><span class="nav-icon">⚙</span>Set</button>
</nav>

<script>
// ── Navigation ──
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
  if (id === 'news' && allNews.length === 0) fetchNews();
}

// ── Clock ──
function tick() {
  const n = new Date(); const pad = v => String(v).padStart(2,'0');
  document.getElementById('clock').textContent = pad(n.getHours())+':'+pad(n.getMinutes());
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  document.getElementById('dateStr').textContent = `${n.getMonth()+1}/${n.getDate()} (${days[n.getDay()]})`;
  document.getElementById('greeting').textContent = n.getHours()<12?'Good Morning':n.getHours()<18?'Good Afternoon':'Good Evening';
}
tick(); setInterval(tick, 1000);

// ── News RSS Config ──
const RSS_FEEDS = [
  { cat:'NW', name:'Cisco', url:'https://newsroom.cisco.com/c/r/newsroom/en/us/rss/news-all.xml', emoji:'🌐' },
  { cat:'NW', name:'Yamaha', url:'https://network.yamaha.com/news.rss', emoji:'🎹' },
  { cat:'NW', name:'Fortinet', url:'https://www.fortinet.com/rss/blog.xml', emoji:'🛡️' },
  { cat:'NW', name:'HPE', url:'https://www.hpe.com/us/en/newsroom/rss.xml', emoji:'🏢' },
  { cat:'Cloud', name:'AWS What\'s New', url:'https://aws.amazon.com/about-aws/whats-new/recent/feed/', emoji:'☁️' },
  { cat:'Cloud', name:'Google Cloud', url:'https://cloud.google.com/blog/rss/', emoji:'🔍' },
  { cat:'Cloud', name:'OCI', url:'https://www.oracle.com/news/rss/index.xml', emoji:'🔴' },
  { cat:'Cloud', name:'ITmedia Cloud', url:'https://rss.itmedia.co.jp/rss/2.0/cloud_user.xml', emoji:'📊' },
  { cat:'Dev', name:'Publickey', url:'https://www.publickey1.jp/atom.xml', emoji:'🔑' },
  { cat:'Dev', name:'HashiCorp', url:'https://www.hashicorp.com/blog/feed.xml', emoji:'🏗️' },
  { cat:'Dev', name:'Zenn Terraform', url:'https://zenn.dev/topics/terraform/feed', emoji:'📝' }
];

let allNews = [];
let currentFilter = 'all';

// ── RSS Fetch (AllOriginsのフォールバックを追加して修正) ──
async function fetchFeed(feed) {
  const urls = [
    `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}&count=5`,
    `https://api.allorigins.win/get?url=${encodeURIComponent(feed.url)}`
  ];

  // 1. まず rss2json を試す
  try {
    const r = await fetch(urls[0], { signal: AbortSignal.timeout(8000) });
    const d = await r.json();
    if (d.status === 'ok' && d.items) {
      return d.items.map(item => ({
        category: feed.cat, source: feed.name, emoji: feed.emoji,
        title: item.title, url: item.link, time: item.pubDate
      }));
    }
  } catch (e) {}

  // 2. 失敗したら AllOrigins で生のXMLを取得してパース（フォールバック）
  try {
    const r = await fetch(urls[1], { signal: AbortSignal.timeout(8000) });
    const d = await r.json();
    const parser = new DOMParser();
    const xml = parser.parseFromString(d.contents, 'text/xml');
    const items = [...xml.querySelectorAll('item')].slice(0, 5); // 5件だけ取得
    return items.map(item => ({
      category: feed.cat, source: feed.name, emoji: feed.emoji,
      title: item.querySelector('title')?.textContent?.trim() || 'タイトルなし',
      url: item.querySelector('link')?.textContent?.trim() || item.querySelector('guid')?.textContent?.trim(),
      time: item.querySelector('pubDate')?.textContent?.trim()
    }));
  } catch (e) {
    console.error("Feed error:", feed.name);
  }
  return [];
}

async function fetchNews() {
  const container = document.getElementById('newsList');
  container.innerHTML = '<div class="news-msg" style="text-align:center; padding:40px; color:var(--muted); font-family:var(--mono); font-size:12px;">Fetching latest tech news...</div>';
  
  allNews = [];
  const results = await Promise.allSettled(RSS_FEEDS.map(f => fetchFeed(f)));
  results.forEach(r => { if(r.status === 'fulfilled') allNews.push(...r.value); });

  // リンクとタイトルがない不正なデータを除外して、日付順にソート
  allNews = allNews.filter(n => n.title && n.url);
  allNews.sort((a,b) => new Date(b.time || 0) - new Date(a.time || 0));
  renderNews();
}

function filterNews(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.news-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderNews();
}

function renderNews() {
  const list = currentFilter === 'all' ? allNews : allNews.filter(n => n.category === currentFilter);
  const container = document.getElementById('newsList');
  
  if (list.length === 0) {
    container.innerHTML = '<div class="news-msg" style="text-align:center; padding:40px; color:var(--muted); font-family:var(--mono); font-size:12px;">No articles found. Try reloading.</div>';
    return;
  }

  container.innerHTML = list.map(n => `
    <a class="news-item" href="${n.url}" target="_blank">
      <div class="news-item-body">
        <div class="news-meta">
          <span class="news-tag">${n.source}</span>
          <span>${timeAgo(n.time)}</span>
        </div>
        <div class="news-title">${n.title}</div>
      </div>
      <div class="news-thumb-placeholder">${n.emoji}</div>
    </a>
  `).join('');
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const diff = Math.floor((new Date() - new Date(dateStr)) / 1000 / 60);
  if (isNaN(diff) || diff < 0) return 'Just now';
  if (diff < 60) return diff + 'm ago';
  if (diff < 1440) return Math.floor(diff/60) + 'h ago';
  return Math.floor(diff/1440) + 'd ago';
}

// 初期化
window.onload = () => { tick(); fetchNews(); };
</script>
</body>
</html>
